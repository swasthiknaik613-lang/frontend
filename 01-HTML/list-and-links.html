<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name ="viewport" content="width=device-width,initial-scale=1.0">
        <title>list and link practice</title>
    </head>
    <body>
        <h2>1.unordered list(bulleted)</h2>
        <ul>
            <li>html</li>
            <li>css</li>
            <li>javascript</li>
        </ul>
        <h2>2.ordered list(numbered)</h2>
        <ol>
            <li>html</li>
            <li>css</li>
            <li>javascript</li>
        </ol>
        <h2>3.hyper link</h2>
        <a href="https://www.google.com">Visit Google</a>
    </body>
</html>
